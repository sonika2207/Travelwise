spring.application.name=travel-itinerary-backend

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# OpenWeatherMap
weather.api.key=${WEATHER_API_KEY}
weather.base.url=https://api.openweathermap.org/data/2.5
weather.geo.url=https://api.openweathermap.org/geo/1.0

# Pexels
photo.api.key=${PHOTO_API_KEY}
photo.base.url=https://api.pexels.com

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Currency API
currency.api.url=https://open.er-api.com/v6/latest

# Startup and Performance tuning
spring.main.lazy-initialization=true

# Hibernate / JPA Optimizations
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.properties.hibernate.generate_statistics=false

# Hikari CP limits for Neon/Render Free tiers
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# Web static resource caching
spring.web.resources.cache.cachecontrol.max-age=31536000

server.port=${PORT:8080}