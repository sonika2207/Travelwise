# Render Blueprint Specification for TravelWise Frontend
# Placed in root directory to configure the static site deployment
services:
  - type: static
    name: travelwise-frontend
    env: static
    rootDir: frontend
    buildCommand: npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
        action: rewrite
